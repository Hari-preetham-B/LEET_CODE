name: Update README

on:
  push:
    paths:
      - "problems.csv"   # Only triggers when you update the CSV
  workflow_dispatch:     # Also allows manual trigger from Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write    # Needed to push the updated README back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate README
        run: python scripts/generate_readme.py

      - name: Commit and push updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README [skip ci]"
          git push
